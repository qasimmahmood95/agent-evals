name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run replay   # every committed fixture must reproduce itself - no keys, no network
      - run: npm run check    # demo suite violation-free; adversarial suite catches every villain
      - run: npm run gate     # statistical gate vs committed baseline (demo:gate ships red on purpose)
